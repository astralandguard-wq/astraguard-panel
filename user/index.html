<!doctype html>
<html lang="fa" dir="rtl" data-theme="dark">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Nova Proxy Dashboard</title>
<meta name="nova-userhub-version" content="4.0.0" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Vazirmatn:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
<script>
  (function(){ try{
    var l = localStorage.getItem('nova-user-lang') || 'fa';
    document.documentElement.lang = l; document.documentElement.dir = l==='fa'?'rtl':'ltr';
    var th = localStorage.getItem('nova-theme'); document.documentElement.dataset.theme = th==='light'?'light':'dark';
  }catch(e){} })();
</script>
<style>
  :root{
    --bg: #090d16; --surface: #111827; --surface-card: #1f2937; --surface-inner: #111827;
    --border: #374151; --border-focus: #6366f1; --text: #f9fafb; --text-muted: #9ca3af; --text-dim: #6b7280;
    --primary: #6366f1; --primary-soft: rgba(99, 102, 241, 0.15); --primary-glow: rgba(99, 102, 241, 0.4);
    --success: #10b981; --warning: #f59e0b; --danger: #ef4444;
    --radius-lg: 20px; --radius-md: 14px; --radius-sm: 8px;
    --font-en: 'Plus Jakarta Sans', system-ui, sans-serif;
    --font-fa: 'Vazirmatn', system-ui, sans-serif;
  }
  html[data-theme=light]{
    --bg: #f3f4f6; --surface: #ffffff; --surface-card: #f9fafb; --surface-inner: #f3f4f6;
    --border: #e5e7eb; --border-focus: #4f46e5; --text: #111827; --text-muted: #4b5563; --text-dim: #9ca3af;
    --primary: #4f46e5; --primary-soft: rgba(79, 70, 229, 0.1); --primary-glow: rgba(79, 70, 229, 0.2);
    --success: #059669; --warning: #d97706; --danger: #dc2626;
  }
  *{box-sizing:border-box;outline:none;-webkit-tap-highlight-color:transparent}
  body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--font-fa);min-height:100vh;-webkit-font-smoothing:antialiased;transition:background 0.3s, color 0.3s}
  html[dir=ltr] body{font-family:var(--font-en)}
  
  .container{max-width:800px;margin:0 auto;padding:40px 20px 80px}
  
  /* Topbar & Header */
  .header{display:flex;align-items:center;justify-content:space-between;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 24px;margin-bottom:24px;box-shadow:0 4px 20px -2px rgba(0,0,0,0.05)}
  .brand-zone{display:flex;align-items:center;gap:14px}
  .logo-wrapper{width:46px;height:46px;border-radius:var(--radius-md);background:var(--primary-soft);border:1px solid var(--primary);display:flex;align-items:center;justify-content:center;box-shadow:0 0 15px var(--primary-glow)}
  .logo-wrapper svg{width:24px;height:24px;color:var(--primary)}
  .brand-title{font-size:18px;font-weight:800;letter-spacing:-0.5px}
  .status-badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;color:var(--text-muted);font-weight:500;margin-top:2px}
  .status-dot{width:6px;height:6px;border-radius:50%;background:var(--success);animation:pulse 2s infinite}
  
  @keyframes pulse{
    0% {box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.7);}
    70% {box-shadow: 0 0 0 6px rgba(16, 185, 129, 0);}
    100% {box-shadow: 0 0 0 0 rgba(16, 185, 129, 0);}
  }

  .actions-zone{display:flex;gap:10px}
  .toggle-group{display:flex;background:var(--surface-inner);border:1px solid var(--border);border-radius:var(--radius-md);padding:4px}
  .toggle-group button{border:none;background:transparent;color:var(--text-muted);font-family:inherit;font-size:12px;font-weight:700;padding:6px 14px;border-radius:var(--radius-sm);cursor:pointer;transition:all 0.2s}
  .toggle-group button.active{background:var(--primary);color:#fff;box-shadow:0 2px 8px var(--primary-glow)}

  /* Info Banners */
  .hero-msg{background:var(--primary-soft);border:1px solid var(--primary);color:var(--text);border-radius:var(--radius-md);padding:16px;font-size:13.5px;font-weight:600;line-height:1.6;margin-bottom:20px;display:flex;align-items:center;gap:12px}
  .hero-msg svg{flex-shrink:0;color:var(--primary)}
  .intro-text{color:var(--text-muted);font-size:14px;line-height:1.7;margin:0 4px 24px}
  .intro-text b{color:var(--primary);font-weight:700}

  /* Usage Dashboard Card */
  .card-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:24px;margin-bottom:24px;box-shadow:0 10px 30px -10px rgba(0,0,0,0.1)}
  .card-title{font-size:15px;font-weight:700;margin:0 0 20px;color:var(--text);display:flex;align-items:center;gap:8px}
  .card-panel[hidden]{display:none}
  
  .stats-grid{display:grid;grid-template-columns:repeat(3, 1fr);gap:16px;margin-bottom:20px}
  .stat-item{background:var(--surface-card);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;display:flex;flex-direction:column;gap:6px}
  .stat-label{font-size:11px;font-weight:700;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px}
  .stat-value{font-size:16px;font-weight:800;color:var(--text)}
  .stat-value.alert-warn{color:var(--warning)}
  .stat-value.alert-danger{color:var(--danger)}
  
  .progress-container{height:8px;background:var(--surface-inner);border-radius:99px;overflow:hidden;margin-bottom:14px;border:1px solid var(--border)}
  .progress-bar{height:100%;width:0;background:var(--primary);border-radius:99px;transition:width 0.6s cubic-bezier(0.4, 0, 0.2, 1)}
  .progress-bar.alert-warn{background:var(--warning)}
  .progress-bar.alert-danger{background:var(--danger)}
  
  .stats-footer{display:flex;gap:16px;font-size:12px;color:var(--text-muted);background:var(--surface-card);padding:10px 16px;border-radius:var(--radius-md);border:1px solid var(--border)}
  .stats-footer span{display:flex;align-items:center;gap:6px}
  .stats-footer .up-arrow{color:var(--primary)}
  .stats-footer .down-arrow{color:var(--success)}

  /* Subscription Link Bar */
  .sub-bar{display:flex;align-items:center;gap:12px;background:var(--surface-inner);border:1px solid var(--border);border-radius:var(--radius-md);padding:8px 12px;margin-bottom:24px}
  .sub-bar code{flex:1;font-family:ui-monospace, monospace;font-size:12px;color:var(--text-muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;direction:ltr;text-align:left;padding:0 8px}

  /* Radar Section */
  .radar-panel{border-color:var(--primary)}
  .radar-header{display:flex;align-items:center;justify-content:between;width:100%;gap:12px;margin-bottom:16px}
  .radar-meta{flex:1}
  .radar-title-main{font-size:16px;font-weight:800;color:var(--text)}
  .radar-desc{font-size:12px;color:var(--text-muted);margin-top:4px;line-height:1.5}
  
  .chip-group{display:flex;flex-wrap:wrap;gap:8px;margin:16px 0}
  .chip{background:var(--surface-card);border:1px solid var(--border);border-radius:99px;color:var(--text-muted);padding:6px 16px;font-size:12px;font-weight:700;font-family:var(--font-en);cursor:pointer;transition:all 0.15s}
  .chip.selected{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}

  .btn-action{width:100%;height:44px;background:var(--primary);color:#fff;border:none;border-radius:var(--radius-md);font-family:inherit;font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;box-shadow:0 4px 12px var(--primary-glow)}
  .btn-action:hover{filter:brightness(1.1)}
  .btn-action:disabled{background:var(--border);color:var(--text-dim);cursor:not-allowed;box-shadow:none}
  
  .btn-secondary{background:var(--surface-card);border:1px solid var(--border);color:var(--text);box-shadow:none}
  .btn-secondary:hover{border-color:var(--primary);color:var(--primary)}
  .btn-sm{height:34px;padding:0 14px;font-size:12px;border-radius:var(--radius-sm)}

  .radar-log{font-size:13px;color:var(--text-muted);text-align:center;margin:12px 0;min-height:20px;font-weight:500}
  
  /* Tables */
  .results-table-wrapper{border:1px solid var(--border);border-radius:var(--radius-md);overflow:hidden;margin-top:16px;background:var(--surface-inner)}
  .results-table{width:100%;border-collapse:collapse;font-size:13px;text-align:center}
  .results-table th{background:var(--surface-card);color:var(--text-dim);padding:10px;font-weight:700;font-size:11px;text-transform:uppercase}
  .results-table td{padding:12px 10px;border-top:1px solid var(--border);color:var(--text-muted)}
  .results-table td code{font-family:ui-monospace, monospace;color:var(--text);font-weight:600}
  .results-table tr.top-speed td{background:rgba(16, 185, 129, 0.08);color:var(--success)}
  .results-table tr.top-speed td code{color:var(--success)}

  .config-output-box{background:var(--surface-inner);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px;font-family:ui-monospace, monospace;font-size:11px;direction:ltr;text-align:left;word-break:break-all;color:var(--text-muted);max-height:100px;overflow-y:auto;margin:14px 0}
  .qr-center{display:flex;justify-content:center;margin-top:16px}
  .qr-holder{background:#fff;border-radius:var(--radius-md);padding:12px;box-shadow:0 10px 25px rgba(0,0,0,0.1)}

  /* App Cards Grid */
  .apps-grid{display:grid;grid-template-columns:repeat(auto-fill, minmax(240px, 1fr));gap:16px;margin-top:24px}
  .app-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:20px;display:flex;flex-direction:column;gap:16px;position:relative;overflow:hidden;transition:transform 0.2s, border-color 0.2s}
  .app-card:hover{transform:translateY(-2px);border-color:var(--primary)}
  .app-card.featured{border-color:var(--primary-glow);background:linear-gradient(to bottom down, var(--surface), var(--primary-soft))}
  
  .app-info{display:flex;align-items:center;gap:12px}
  .app-icon{width:36px;height:36px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:14px;color:#fff;font-family:var(--font-en)}
  .app-name{font-size:15px;font-weight:700}
  .featured-tag{margin-inline-start:auto;background:var(--primary);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px}
  
  .app-qr-zone{display:flex;justify-content:center;margin:4px 0}
  .app-qr-container{background:#fff;border-radius:var(--radius-md);padding:8px;display:flex;align-items:center;justify-content:center;width:130px;height:130px}
  .app-qr-container canvas, .app-qr-container img{width:114px;height:114px;display:block}
  
  .scan-tip{font-size:11px;color:var(--text-dim);text-align:center;margin-top:-6px}
  .app-actions{display:flex;flex-direction:column;gap:8px}

  /* Footer */
  .footer{margin-top:48px;text-align:center;color:var(--text-dim);font-size:13px;border-top:1px solid var(--border);padding-top:24px}
  .social-links{display:flex;justify-content:center;gap:14px;margin-top:14px}
  .social-links a{display:flex;align-items:center;justify-content:center;width:38px;height:38px;border:1px solid var(--border);border-radius:var(--radius-sm);color:var(--text-muted);transition:all 0.2s;background:var(--surface)}
  .social-links a:hover{border-color:var(--primary);color:var(--primary);transform:translateY(-2px)}
  .social-links svg{width:20px;height:20px}

  /* Toast Notification */
  .toast-banner{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);font-weight:700;padding:12px 24px;border-radius:99px;font-size:13.5px;box-shadow:0 10px 25px rgba(0,0,0,0.2);opacity:0;pointer-events:none;z-index:99;transition:all 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275)}
  .toast-banner.visible{opacity:1;transform:translateX(-50%) translateY(0)}

  /* Responsive Adjustments */
  @media(max-width:600px){
    .header{flex-direction:column;gap:16px;align-items:stretch}
    .actions-zone{justify-content:space-between}
    .stats-grid{grid-template-columns:1fr;gap:10px}
    .container{padding:16px 12px 60px}
    .apps-grid{grid-template-columns:1fr}
  }
</style>
</head>
<body>

  <div class="container">
    <!-- Top Header Navigation -->
    <header class="header">
      <div class="brand-zone">
        <div class="logo-wrapper">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
        </div>
        <div>
          <div class="brand-title">Nova Proxy</div>
          <div class="status-badge"><span class="status-dot"></span><span id="brandsub">...</span></div>
        </div>
      </div>
      <div class="actions-zone">
        <div class="toggle-group" id="lang"><button data-l="en">EN</button><button data-l="fa">فا</button></div>
        <div class="toggle-group" id="theme"><button data-t="light">☀️</button><button data-t="dark">🌙</button></div>
      </div>
    </header>

    <!-- Info & Subtitles -->
    <div class="hero-msg">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span id="freebar">...</span>
    </div>
    <p class="intro-text" id="subtitle"></p>

    <!-- Traffic Usage Statistics -->
    <section class="card-panel" id="usage" hidden>
      <h3 class="card-title">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        <span id="usage-title">Data Usage</span>
      </h3>
      <div class="stats-grid">
        <div class="stat-item"><span class="stat-label" id="ul-used">Used</span><span class="stat-value" id="u-used">-</span></div>
        <div class="stat-item"><span class="stat-label" id="ul-total">Limit</span><span class="stat-value" id="u-total">-</span></div>
        <div class="stat-item"><span class="stat-label" id="ul-exp">Expires</span><span class="stat-value" id="u-exp">-</span></div>
      </div>
      <div class="progress-container" id="u-bar-wrap"><div class="progress-bar" id="u-bar"></div></div>
      <div class="stats-footer" id="u-split"></div>
    </section>

    <!-- Subscription Actions -->
    <div class="sub-bar">
      <button class="btn-action btn-secondary btn-sm" id="copyraw" style="width:auto; white-space:nowrap;"></button>
      <code id="rawsub">...</code>
    </div>

    <!-- Network Radar Optimizer -->
    <section class="card-panel radar-panel" id="radar">
      <div class="radar-header">
        <div class="radar-meta">
          <div class="radar-title-main" id="radar-title">...</div>
          <div class="radar-desc" id="radar-sub">...</div>
        </div>
      </div>
      
      <div class="chip-group" id="radar-ports" role="group">
        <button type="button" class="chip selected" data-port="443" aria-pressed="true">443</button>
        <button type="button" class="chip" data-port="8443" aria-pressed="false">8443</button>
        <button type="button" class="chip" data-port="2053" aria-pressed="false">2053</button>
        <button type="button" class="chip" data-port="2083" aria-pressed="false">2083</button>
        <button type="button" class="chip" data-port="2087" aria-pressed="false">2087</button>
        <button type="button" class="chip" data-port="2096" aria-pressed="false">2096</button>
      </div>

      <button class="btn-action" id="radar-run"></button>
      
      <div class="progress-container" id="radar-bar" style="display:none; margin-top:16px"><div class="progress-bar" id="radar-fill"></div></div>
      <div class="radar-log" id="radar-msg" role="status" aria-live="polite"></div>
      
      <div id="radar-results"></div>
      
      <div id="radar-apply-row" style="display:none; margin-top:16px">
        <button class="btn-action" id="radar-apply"></button>
        <div class="radar-log" id="radar-apply-msg" role="status" aria-live="polite"></div>
      </div>
      
      <div id="radar-out" style="display:none">
        <div class="config-output-box" id="radar-cfg"></div>
        <button class="btn-action btn-secondary btn-sm" id="radar-copy"></button>
        <div class="qr-center"><div class="qr-holder" id="radar-qr"></div></div>
      </div>
    </section>

    <!-- Client Applications Grid -->
    <main class="apps-grid" id="grid"></main>

    <!-- Footer Area -->
    <footer class="footer" id="foot"></footer>
  </div>

  <div class="toast-banner" id="toast" role="status" aria-live="polite"></div>

  <script src="/qrcode.min.js"></script>
  <script>
  (function(){

      var s = u.toString();
      if (!fmt) return s;
      return s + (s.indexOf('?')>-1 ? '&' : '?') + (fmt==='b64' ? 'b64' : fmt);
    }
    function uname(){ try{ var u=new URL(location.href); return u.searchParams.get('u')||u.searchParams.get('sub')||''; }catch(e){ return ''; } }

    var CLIENTS = [
      { name:'Hiddify',   color:'#6366f1', rec:true,  fmt:'b64',   deep:function(u){ return 'hiddify://import/'+u; } },
      { name:'v2rayNG',   color:'#2563eb', rec:false, fmt:'b64',   deep:function(u){ return 'v2rayng://install-config?url='+encodeURIComponent(u); } },
      { name:'Streisand', color:'#0ea5e9', rec:false, fmt:'b64',   deep:function(u){ return 'streisand://import/'+u; } },
      { name:'FlClash',   color:'#06b6d4', rec:true,  fmt:'clash',  deep:function(u){ return 'clash://install-config?url='+encodeURIComponent(u); } },
      { name:'Clash Meta',color:'#10b981', rec:false, fmt:'clash',  deep:function(u){ return 'clash://install-config?url='+encodeURIComponent(u); } },
      { name:'Karing',    color:'#16a34a', rec:false, fmt:'clash',  deep:function(u){ return 'karing://install-config?url='+encodeURIComponent(u)+'&name=Nova'; } },
      { name:'sing-box',  color:'#64748b', rec:false, fmt:'singbox', deep:function(u){ return 'sing-box://import-remote-profile?url='+encodeURIComponent(u); } },
      { name:'NekoBox',   color:'#f59e0b', rec:false, fmt:'singbox', deep:function(u){ return 'sing-box://import-remote-profile?url='+encodeURIComponent(u); } }
    ];

    function toast(msg){ var t=document.getElementById('toast'); t.textContent=msg; t.classList.add('visible'); clearTimeout(t._h); t._h=setTimeout(function(){ t.classList.remove('visible'); },1800); }
    function copy(text){ try{ navigator.clipboard.writeText(text); }catch(e){ var ta=document.createElement('textarea'); ta.value=text; document.body.appendChild(ta); ta.select(); try{document.execCommand('copy');}catch(_){} document.body.removeChild(ta); } toast(I18N[lang].copied); }
    function esc(s){ return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/"/g,'&quot;'); }
    function fmtBytes(n){ n=Number(n)||0; if(n<=0) return '0 GB'; var u=['B','KB','MB','GB','TB','PB']; var i=Math.floor(Math.log(n)/Math.log(1024)); i=Math.max(0,Math.min(i,u.length-1)); var v=n/Math.pow(1024,i); return (v>=100?v.toFixed(0):v>=10?v.toFixed(1):v.toFixed(2))+' '+u[i]; }

    async function loadUsage(){
      try{
        var r = await fetch(subFor('b64'), { cache:'no-store' });
        var h = r.headers.get('Subscription-Userinfo'); if(!h) return;
        var d={}; h.split(';').forEach(function(p){ var kv=p.trim().split('='); if(kv.length===2) d[kv[0].trim()]=Number(kv[1]); });
        var up=d.upload||0, down=d.download||0, total=d.total||0, expire=d.expire||0;
        USAGE = { up:up, down:down, total:total, expire:expire, used:up+down, unlim: !total || total>=1099511627776000, noexp: !expire || expire>=4102300000 };
        renderUsage();
      }catch(e){}
    }

    function renderUsage(){
      if(!USAGE) return;
      var t=I18N[lang], el=document.getElementById('usage');
      document.getElementById('ul-used').textContent=t.used;
      document.getElementById('ul-total').textContent=t.total;
      document.getElementById('ul-exp').textContent=t.expires;
      document.getElementById('u-used').textContent=fmtBytes(USAGE.used);
      var totalEl=document.getElementById('u-total'), bar=document.getElementById('u-bar'), barWrap=document.getElementById('u-bar-wrap');
      if(USAGE.unlim){ totalEl.textContent=t.unlimited; barWrap.style.display='none'; }
      else{
        totalEl.textContent=fmtBytes(USAGE.total);
        barWrap.style.display='';
        var pct=Math.max(0,Math.min(100, USAGE.used/USAGE.total*100));
        bar.style.width=pct.toFixed(1)+'%';
        bar.className='progress-bar'+(pct>=90?' alert-danger':pct>=75?' alert-warn':'');
        document.getElementById('u-used').className='stat-value'+(pct>=90?' alert-danger':pct>=75?' alert-warn':'');
      }
      var expEl=document.getElementById('u-exp');
      if(USAGE.noexp){ expEl.textContent=t.noexpiry; expEl.className='stat-value'; }
      else{
        var ms=USAGE.expire*1000, days=Math.ceil((ms-Date.now())/86400000);
        if(days<0){ expEl.textContent=t.expired; expEl.className='stat-value alert-danger'; }
        else if(days===0){ expEl.textContent=t.today; expEl.className='stat-value alert-warn'; }
        else{ expEl.textContent=days+' '+t.days; expEl.className='stat-value'+(days<=3?' alert-warn':''); }
      }
      var split=document.getElementById('u-split');
      split.innerHTML='<span><span class="up-arrow">↑</span> '+t.up+': '+fmtBytes(USAGE.up)+'</span><span><span class="down-arrow">↓</span> '+t.down+': '+fmtBytes(USAGE.down)+'</span>'+
        (USAGE.unlim?'':'<span>'+t.remaining+': '+fmtBytes(Math.max(0,USAGE.total-USAGE.used))+'</span>');
      el.hidden=false;
    }

    function radarSyncChips(){
      document.querySelectorAll('#radar-ports .chip').forEach(function(b){
        b.onclick = function(){
          var active = b.getAttribute('aria-pressed') === 'true';
          b.setAttribute('aria-pressed', !active);
          b.classList.toggle('selected', !active);
        }
      });
    }

    function render(){
      var t = I18N[lang];
      document.documentElement.lang = lang; document.documentElement.dir = lang==='fa'?'rtl':'ltr';
      
      document.getElementById('brandsub').textContent = t.brandsub;
      var who = uname();
      document.getElementById('subtitle').innerHTML = (who ? (t.sub_user+'<b>'+esc(who)+'</b>. ') : '') + t.subtitle;
      document.getElementById('freebar').textContent = t.free_h;
      document.getElementById('foot').innerHTML = '<div>'+esc(t.foot)+'</div><div class="social-links"><a href="https://t.me/irnova_proxy" target="_blank" rel="noopener" aria-label="Telegram"><svg viewBox="0 0 24 24" fill="currentColor"><path d="M21.94 4.6 18.9 19.2c-.23 1.01-.83 1.26-1.68.78l-4.64-3.42-2.24 2.16c-.25.25-.46.46-.94.46l.33-4.73 8.6-7.77c.37-.33-.08-.52-.58-.19l-10.63 6.7-4.58-1.43c-1-.31-1.01-1 .21-1.48l17.9-6.9c.83-.31 1.56.19 1.29 1.45z"/></svg></a></div>';
      
      var rawUrl = subFor('b64');
      document.getElementById('rawsub').textContent = rawUrl;
      var cr = document.getElementById('copyraw'); cr.textContent = t.copyraw; cr.onclick=function(){ copy(rawUrl); };
      
      document.getElementById('radar-title').textContent=t.radar_title; 
      document.getElementById('radar-sub').textContent=t.radar_sub; 
      document.getElementById('radar-run').textContent=t.radar_run;
      
      var grid = document.getElementById('grid'); grid.innerHTML='';
      CLIENTS.forEach(function(c){
        var sub = subFor(c.fmt);
        var card = document.createElement('div'); card.className='app-card'+(c.rec?' featured':'');
        card.innerHTML =
          '<div class="app-info"><span class="app-icon" style="background:'+c.color+'">'+c.name[0].toUpperCase()+'</span><span class="app-name">'+c.name+'</span>'+(c.rec?'<span class="featured-tag">★ Recommended</span>':'')+'</div>'+
          '<div class="app-qr-zone"><div class="app-qr-container"></div></div>'+
          '<div class="scan-tip">'+t.scanhint+'</div>'+
          '<div class="app-actions"><a class="btn-action" href="'+c.deep(sub)+'">+ '+t.add+'</a><button class="btn-action btn-secondary btn-sm" data-copy="'+esc(sub)+'">'+t.copy+'</button></div>';
        grid.appendChild(card);
        var qbox = card.querySelector('.app-qr-container');
        try {
          if (window.QRCode) { new QRCode(qbox, { text: sub, width:114, height:114, correctLevel: QRCode.CorrectLevel.M }); }
          else { qbox.innerHTML = '<span class="scan-tip">'+t.qmiss+'</span>'; }
        } catch(e){ qbox.innerHTML = '<span class="scan-tip">'+t.qmiss+'</span>'; }
      });
      
      grid.querySelectorAll('[data-copy]').forEach(function(b){ b.onclick=function(){ copy(b.getAttribute('data-copy')); }; });
      document.querySelectorAll('#lang button').forEach(function(b){ b.classList.toggle('active', b.dataset.l===lang); b.onclick=function(){ localStorage.setItem('nova-user-lang', b.dataset.l); lang=b.dataset.l; render(); }; });
      document.querySelectorAll('#theme button').forEach(function(b){ b.classList.toggle('active', b.dataset.t===theme); b.onclick=function(){ localStorage.setItem('nova-theme', b.dataset.t); theme=b.dataset.t; document.documentElement.dataset.theme=theme; render(); }; });
      radarSyncChips();
      renderUsage();
    }

    // ---- Nova Radar Core Logic ----
    var CF_RANGES=[['104.16.',0,255],['104.17.',0,255],['104.18.',0,255],['104.19.',0,255],['104.20.',0,255],['104.21.',0,255],['104.22.',0,255],['104.24.',0,255],['104.25.',0,255],['104.26.',0,255],['104.27.',0,255],['162.159.',0,255],['172.64.',0,255],['172.66.',0,255],['172.67.',0,255],['188.114.',96,111],['141.101.',64,127]];
    function randCfIp(){ var r=CF_RANGES[Math.floor(Math.random()*CF_RANGES.length)]; var c=r[1]+Math.floor(Math.random()*(r[2]-r[1]+1)); return r[0]+c+'.'+Math.floor(Math.random()*256); }
    function pingIp(ip,port,timeout){ return new Promise(function(res){ var t0=performance.now(),done=false,img=new Image(); function fin(ok){ if(done)return; done=true; img.onerror=img.onload=null; res(ok?Math.round(performance.now()-t0):null); } var timer=setTimeout(function(){fin(false);},timeout); img.onerror=function(){clearTimeout(timer);fin(true);}; img.onload=function(){clearTimeout(timer);fin(true);}; img.src='https://'+(port==443?ip:ip+':'+port)+'/cdn-cgi/trace?'+Math.random(); }); }
    var RTMPL=null, RBEST=[];
    
    async function radarTemplate(){ 
      try{ 
        var r=await fetch(subFor('b64')+'&_t='+Date.now()); var txt=await r.text(); var data=txt; 
        try{ var dec=atob(txt.replace(/\s+/g,'')); if(dec.indexOf('://')>0) data=dec; }catch(e){} 
        var lines=data.split(/[\r\n]+/),v=null; 
        for(var i=0;i<lines.length;i++){ if(lines[i].trim().indexOf('vless://')===0){ v=lines[i].trim(); break; } } 
        if(!v)return; var m=v.match(/^vless:\/\/([^@]+)@([^:]+):(\d+)\?([^#]*)/); if(!m)return; 
        RTMPL={uuid:m[1],port:m[3],query:m[4]}; 
        var pc=document.getElementById('radar-ports'); 
        if(pc){ 
          var tp=String(m[3]); 
          if(!pc.querySelector('[data-port="'+tp+'"]')){ 
            var nb=document.createElement('button'); nb.type='button'; nb.className='chip'; nb.setAttribute('data-port',tp); nb.textContent=tp; pc.insertBefore(nb,pc.firstChild); 
          } 
          var tc=pc.querySelector('[data-port="'+tp+'"]'); if(tc) tc.classList.add('selected'); 
          radarSyncChips(); 
        } 
      }catch(e){} 
    }
    
    function radarCfg(ip,port){ if(!RTMPL)return null; port=port||443; return 'vless://'+RTMPL.uuid+'@'+ip+':'+port+'?'+RTMPL.query+'#'+encodeURIComponent('Nova ⚡ '+ip+':'+port); }
    
    async function radarRun(){
      var t=I18N[lang]; var btn=document.getElementById('radar-run'),msg=document.getElementById('radar-msg'),bar=document.getElementById('radar-bar'),fill=document.getElementById('radar-fill');
      btn.disabled=true; bar.style.display='block'; fill.style.width='0%'; document.getElementById('radar-out').style.display='none'; document.getElementById('radar-results').innerHTML='';
      document.getElementById('radar-apply-row').style.display='none'; document.getElementById('radar-apply-msg').textContent='';
      
      msg.textContent=t.radar_prep; if(!RTMPL) await radarTemplate();
      var ports=Array.prototype.map.call(document.querySelectorAll('#radar-ports .chip.selected'),function(b){return Number(b.getAttribute('data-port'));}).filter(Boolean);
      if(!ports.length){ ports=[443]; var p443=document.querySelector('#radar-ports [data-port="443"]'); if(p443) p443.classList.add('selected'); }
      
      var keep=6,timeout=2000,probes=3,conc=12;
      var maxIps=Math.min(120,Math.max(20,Math.floor(500/ports.length)));
      var ips=[],seen={}; while(ips.length<maxIps){ var ip=randCfIp(); if(!seen[ip]){ seen[ip]=1; ips.push(ip); } }
      var pairs=[]; for(var a=0;a<ips.length;a++){ for(var pi=0;pi<ports.length;pi++){ pairs.push({ip:ips[a],port:ports[pi]}); } }
      var totalN=pairs.length,tested=0,alive=[];
      
      async function w(){ 
        while(pairs.length){ 
          var pr=pairs.pop(); var s=[]; 
          for(var i=0;i<probes;i++){ var ms=await pingIp(pr.ip,pr.port,timeout); if(ms!=null)s.push(ms); } tested++;
          if(s.length){ 
            var avg=Math.round(s.reduce(function(a,b){return a+b;},0)/s.length); 
            var jit=Math.round(Math.max.apply(null,s)-Math.min.apply(null,s)); 
            var loss=Math.round((1-s.length/probes)*100); 
            alive.push({ip:pr.ip,port:pr.port,ms:avg,score:avg+jit*0.5+loss*20}); 
          }
          fill.style.width=Math.max(3,Math.round(tested/totalN*100))+'%'; 
          msg.textContent=t.radar_testing+tested+'/'+totalN+' ('+alive.length+t.radar_alive+')'; 
        } 
      }
      var pool=[]; for(var k=0;k<conc;k++) pool.push(w()); await Promise.all(pool);
      alive.sort(function(a,b){return a.score-b.score;}); RBEST=alive.slice(0,keep);
      fill.style.width='100%'; setTimeout(function(){bar.style.display='none';},500); btn.disabled=false;
      
      if(!RBEST.length){ msg.textContent=t.radar_none; return; }
      msg.textContent=t.radar_done;
      
      if(RBEST.length){ 
        var _ab=document.getElementById('radar-apply'); 
        if(_ab){ _ab.textContent=t.radar_apply; _ab.disabled=false; document.getElementById('radar-apply-row').style.display='block'; } 
      }
      
      var rows=''; 
      for(var i=0;i<RBEST.length;i++){ 
        var b=RBEST[i]; 
        rows+='<tr class="'+(i===0?'top-speed':'')+'"><td>'+(i+1)+'</td><td><code>'+b.ip+':'+b.port+'</code></td><td>'+b.ms+' ms</td></tr>'; 
      }
      document.getElementById('radar-results').innerHTML='<div class="results-table-wrapper"><table class="results-table"><thead><tr><th>#</th><th>IP</th><th>'+t.radar_lat+'</th></tr></thead><tbody>'+rows+'</tbody></table></div>';
      
      if(RTMPL){ 
        var cfg=radarCfg(RBEST[0].ip,RBEST[0].port); 
        document.getElementById('radar-cfg').textContent=cfg; 
        document.getElementById('radar-copy').textContent=t.radar_copycfg; 
        document.getElementById('radar-out').style.display='block';
        var qh=document.getElementById('radar-qr'); qh.innerHTML='';
        try{ if(window.QRCode){ new QRCode(qh, {text:cfg, width:120, height:120}); } }catch(e){}
      }
    }

    document.getElementById('radar-run').onclick = radarRun;
    document.getElementById('radar-copy').onclick = function(){ copy(document.getElementById('radar-cfg').textContent); };
    
    document.getElementById('radar-apply').onclick = async function(){
      if(!RBEST.length) return;
      var t=I18N[lang], amsg=document.getElementById('radar-apply-msg'), abtn=document.getElementById('radar-apply');
      abtn.disabled=true; amsg.textContent=t.radar_applying;
      try{
        var ips=RBEST.map(function(b){return b.ip;});
        var r=await fetch(subFor('hub')||subFor('page')||location.href, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({action:'apply_ips', ips:ips}) });
        if(r.ok || r.status===200){ amsg.textContent=t.radar_applied; toast(t.radar_applied); }
        else { amsg.textContent=t.radar_applyerr; abtn.disabled=false; }
      }catch(e){ amsg.textContent=t.radar_applyerr; abtn.disabled=false; }
    };

    window.onload = function(){ render(); loadUsage(); };
  })();
  </script>
